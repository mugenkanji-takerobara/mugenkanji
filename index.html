<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>むげんかんじ</title>
<style>
body{margin:0;background:#87CEEB;font-family:sans-serif;overflow:hidden;text-align:center}
#wrap{display:inline-block;margin-top:10px}
canvas{display:block;margin:0 auto;border:8px solid #fff;border-radius:20px;background:#fff;touch-action:none}
button{display:block;margin:12px auto;padding:15px 40px;font-size:24px;background:#FF69B4;color:white;border:none;border-radius:12px}
#info{font-size:14px;color:#fff;margin-top:4px}
</style>
</head>
<body>
<div id="wrap">
<canvas id="c" width="360" height="640"></canvas>
<button id="startBtn" onclick="startGame()">ゲームスタート！</button>
<div id="info">左右スワイプで移動、下スワイプで加速！</div>
</div>

<script>
// ====================== むげんかんじ 最終版 ======================
const c = document.getElementById('c');
const ctx = c.getContext('2d');
const ROWS = 12, COLS = 6, SIZE = 55;
let board = Array.from({length:ROWS},()=>Array(COLS).fill(null));
let cur = null;
let score = 0;
let gameOver = false;
let fallSpeed = 700;
let tick = 0;
let chain = 0;

const kanjiList = ['三','五','七','九','十','百','千','万','億','兆','京'];
const bonusList = ['岳','塩','代'];

class Piece {
constructor(){
this.x = 2;
this.y = 0;
this.type = Math.random() < 0.12 ? bonusList[Math.floor(Math.random()*3)] : kanjiList[Math.floor(Math.random()*kanjiList.length)];
}
}

function drawBackground(){
// 立山雪山＋富山湾＋チューリップオキナワン風
const sky = ctx.createLinearGradient(0,0,0,200);
sky.addColorStop(0,'#87CEEB'); sky.addColorStop(1,'#E0FFFF');
ctx.fillStyle = sky; ctx.fillRect(0,0,360,200);

// 雪山シルエット
ctx.fillStyle = '#F8F8FF';
ctx.beginPath(); ctx.moveTo(0,160); ctx.lineTo(60,100); ctx.lineTo(120,140); ctx.lineTo(190,80); ctx.lineTo(260,130); ctx.lineTo(360,160); ctx.fill();

// チューリップ帯（春夏秋冬のカラフルさ）
const colors = ['#FF1493','#FF4500','#FFD700','#00FF7F'];
for(let i=0;i<8;i++){
ctx.fillStyle = colors[i%4];
ctx.fillRect(i*45,200,45,50);
}

// 富山湾の海
const sea = ctx.createLinearGradient(0,250,0,640);
sea.addColorStop(0,'#00BFFF'); sea.addColorStop(1,'#1E90FF');
ctx.fillStyle = sea; ctx.fillRect(0,250,360,390);
}

function draw(){
ctx.clearRect(0,0,360,640);
drawBackground();

for(let r=0;r<ROWS;r++){
for(let j=0;j<COLS;j++){
if(board[r][j]){
drawKanji(j,r,board[r][j],false);
}
}
}
if(cur) drawKanji(cur.x,cur.y,cur.type,true);

ctx.fillStyle = 'white';
ctx.font = 'bold 24px sans-serif';
ctx.fillText('スコア: ' + score, 20, 45);

if(gameOver){
ctx.fillStyle = 'rgba(0,0,0,0.7)';
ctx.fillRect(30,250,300,140);
ctx.fillStyle = 'white';
ctx.font = '22px sans-serif';
ctx.fillText('ゲームオーバー', 80, 300);
ctx.font = '16px sans-serif';
ctx.fillText('また富山の景色で遊ぼう！', 55, 340);
}
}

function drawKanji(x,y,t,isCur){
const px = x*SIZE + 28;
const py = y*SIZE + 80;
ctx.font = isCur ? 'bold 48px sans-serif' : 'bold 38px sans-serif';
ctx.fillStyle = isCur ? '#FF1493' : (bonusList.includes(t) ? '#FF4500' : '#2F4F4F');
ctx.textAlign = 'center';
ctx.textBaseline = 'middle';
ctx.fillText(t, px, py);
}

function startGame(){
document.getElementById('startBtn').style.display = 'none';
board = Array.from({length:ROWS},()=>Array(COLS).fill(null));
score = 0;
gameOver = false;
cur = new Piece();
setInterval(()=>{ if(!gameOver){ tick++; if(tick>fallSpeed/16){ tick=0; stepFall(); } draw(); } },16);
}

function stepFall(){
if(!cur) { cur = new Piece(); return; }
cur.y++;
if(cur.y >= ROWS || board[cur.y][cur.x]){
cur.y--;
board[cur.y][cur.x] = cur.t;
clearMatches();
cur = new Piece();
if(board[0][cur.x]) gameOver = true;
}
}

function clearMatches(){
let cleared = false;
// 縦マッチング
for(let j=0;j<COLS;j++){
let count = 1;
for(let r=1;r<ROWS;r++){
if(board[r][j] && board[r][j] === board[r-1][j]) count++;
else {
if(count >= 3){
for(let k=r-count;k<r;k++) board[k][j] = null;
cleared = true;
}
count = 1;
}
}
if(count >= 3){
for(let k=ROWS-count;k<ROWS;k++) board[k][j] = null;
cleared = true;
}
}
// 横マッチング
for(let r=0;r<ROWS;r++){
let count = 1;
for(let j=1;j<COLS;j++){
if(board[r][j] && board[r][j] === board[r][j-1]) count++;
else {
if(count >= 3){
for(let k=j-count;k<j;k++) board[r][k] = null;
cleared = true;
}
count = 1;
}
}
if(count >= 3){
for(let k=COLS-count;k<COLS;k++) board[r][k] = null;
cleared = true;
}
}
if(cleared){
chain++;
score += 120 * chain;
// 落ちて詰める処理
for(let j=0;j<COLS;j++){
let stack = [];
for(let r=ROWS-1;r>=0;r--) if(board[r][j]) stack.push(board[r][j]);
for(let r=ROWS-1;r>=0;r--) board[r][j] = stack.length ? stack.shift() : null;
}
} else chain = 0;
}

draw();
</script>
</body>
</html>
