<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>海と白き峰の記憶｜きぼうかんじ</title>

    <!-- スタイルシート（後でCSSをここに追加） -->
    <style>
        /* 画面全体の基本設定 */
body {
    margin: 0;
    padding: 0;
    background: #ffffff;
    font-family: "Noto Sans JP", sans-serif;
    color: #000;
}

/* 画面切り替え用 */
.screen {
    width: 100%;
    height: 100vh;
    overflow-y: auto;
    padding: 20px;
    box-sizing: border-box;
}

/* 物語タイトル（サブタイトル） */
.story-title {
    font-size: 22px;
    font-weight: bold;
    text-align: center;
    margin-bottom: 20px;
}

/* 日本語・英語本文 */
.story-text {
    font-size: 18px;
    line-height: 1.9;
    white-space: pre-wrap;
    margin-bottom: 30px;
}

/* 英語は少し小さめ */
.story-text.en {
    font-size: 16px;
}

/* 言語切り替えボタン */
.lang-buttons {
    display: flex;
    justify-content: center;
    gap: 10px;
    margin-bottom: 25px;
}

.lang-btn {
    padding: 10px 20px;
    font-size: 16px;
    border: 1px solid #000;
    background: #fff;
    border-radius: 6px;
}

.lang-btn.active {
    background: #000;
    color: #fff;
}

/* ナビゲーションボタン */
.nav-buttons {
    display: flex;
    justify-content: space-between;
    margin-top: 20px;
}

.nav-btn {
    padding: 12px 20px;
    font-size: 16px;
    border: 1px solid #000;
    background: #fff;
    border-radius: 6px;
}

/* タイトルへ戻る */
.back-title {
    text-align: center;
    margin-top: 30px;
}

.back-title .nav-btn {
    width: 60%;
}

/* フェードイン演出 */
.fade {
    animation: fadeIn 0.6s ease;
}

@keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
}

    </style>
</head>

<body>

    <!-- ▼ タイトル画面（後で中身を追加） -->
    <div id="titleScreen" class="screen">
        <!-- タイトルやボタンを後で追加 -->
    </div>

    <!-- ▼ ゲーム画面（後で中身を追加） -->
    <div id="gameScreen" class="screen" style="display:none;">
        <!-- ゲームのcanvasやUIを後で追加 -->
    </div>

<!-- ▼ 物語モード画面 -->
<div id="storyScreen" class="screen" style="display:none;">

    <!-- サブタイトル -->
    <h2 id="storyTitle" class="story-title"></h2>

    <!-- 日本語本文 -->
    <div id="storyTextJP" class="story-text jp"></div>

    <!-- 英語本文 -->
    <div id="storyTextEN" class="story-text en" style="display:none;"></div>

    <!-- 言語切り替えボタン -->
    <div class="lang-buttons">
        <button id="btnJP" class="lang-btn active">日本語</button>
        <button id="btnEN" class="lang-btn">English</button>
    </div>

    <!-- ナビゲーションボタン -->
    <div class="nav-buttons">
        <button id="prevBtn" class="nav-btn">← もどる</button>
        <button id="nextBtn" class="nav-btn">つぎへ →</button>
    </div>

    <!-- タイトル画面へ戻る -->
    <div class="back-title">
        <button id="backToTitle" class="nav-btn">タイトルへ</button>
    </div>

</div>
    </div>

    <script>
        // ------------------------------
// 物語データ（後で本文を追加）
// ------------------------------
const STORY = [
    {
        title: "海のほとりにひらく景色",
        jp: "",
        en: ""
    },
    {
        title: "牛若丸と呼ばれた子",
        jp: "",
        en: ""
    },
    {
        title: "源氏の旗と荒れる海",
        jp: "",
        en: ""
    },
    {
        title: "北へ向かう旅",
        jp: "",
        en: ""
    },
    {
        title: "雨をさける岩の下",
        jp: "",
        en: ""
    },
    {
        title: "雨が晴れたときの光",
        jp: "",
        en: ""
    },
    {
        title: "四季の移ろい",
        jp: "",
        en: ""
    },
    {
        title: "旅のつづきと今の浜",
        jp: "",
        en: ""
    }
];

// 現在の章
let currentChapter = 0;

// ------------------------------
// 物語を表示する関数
// ------------------------------
function showStory(chapter) {
    currentChapter = chapter;

    const data = STORY[chapter];

    document.getElementById("storyTitle").textContent = data.title;
    document.getElementById("storyTextJP").textContent = data.jp;
    document.getElementById("storyTextEN").textContent = data.en;

    // フェードイン
    document.getElementById("storyScreen").classList.add("fade");
    setTimeout(() => {
        document.getElementById("storyScreen").classList.remove("fade");
    }, 600);
}

// ------------------------------
// 言語切り替え
// ------------------------------
document.getElementById("btnJP").addEventListener("click", () => {
    document.getElementById("storyTextJP").style.display = "block";
    document.getElementById("storyTextEN").style.display = "none";

    document.getElementById("btnJP").classList.add("active");
    document.getElementById("btnEN").classList.remove("active");
});

document.getElementById("btnEN").addEventListener("click", () => {
    document.getElementById("storyTextJP").style.display = "none";
    document.getElementById("storyTextEN").style.display = "block";

    document.getElementById("btnEN").classList.add("active");
    document.getElementById("btnJP").classList.remove("active");
});

// ------------------------------
// 次へ・戻る
// ------------------------------
document.getElementById("nextBtn").addEventListener("click", () => {
    if (currentChapter < STORY.length - 1) {
        showStory(currentChapter + 1);
    }
});

document.getElementById("prevBtn").addEventListener("click", () => {
    if (currentChapter > 0) {
        showStory(currentChapter - 1);
    }
});

// ------------------------------
// タイトルへ戻る
// ------------------------------
document.getElementById("backToTitle").addEventListener("click", () => {
    document.getElementById("storyScreen").style.display = "none";
    document.getElementById("titleScreen").style.display = "block";
});

// ------------------------------
// タイトル画面から物語へ（後でボタン追加）
// ------------------------------
function startStory() {
    document.getElementById("titleScreen").style.display = "none";
    document.getElementById("storyScreen").style.display = "block";
    showStory(0);
}
// 後でここにJavaScriptを貼ります
    </script>

</body>
</html>
